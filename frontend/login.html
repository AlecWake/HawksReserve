<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HawkReserve — Log In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <img src="./images/und-university-of-north-dakota-logo-png_seeklogo-433654.png" alt="University of North Dakota" class="login-logo">
    <h1>HawkReserve</h1>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password">
    </div>

    <div id="error-msg" class="error-box" style="display:none; margin-bottom: 12px;"></div>

    <button class="btn-block" onclick="login()">Log In</button>
  </div>

  <script>
    const existing = JSON.parse(sessionStorage.getItem("user") || "null");
    if (existing) {
      location.href = existing.role === "admin" ? "admin.html" : "index.html";
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errEl = document.getElementById("error-msg");
      errEl.style.display = "none";

      try {
        const res = await fetch("http://localhost:8000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
          errEl.textContent = "Invalid username or password.";
          errEl.style.display = "block";
          return;
        }

        const user = await res.json();
        sessionStorage.setItem("user", JSON.stringify(user));
        location.href = user.role === "admin" ? "admin.html" : "index.html";
      } catch {
        errEl.textContent = "Could not connect to server.";
        errEl.style.display = "block";
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
